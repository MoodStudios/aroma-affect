name: Build AromaCraft

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Build Job - Compiles mod for all platforms
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    
    outputs:
      mod_version: ${{ steps.properties.outputs.mod_version }}
      minecraft_version: ${{ steps.properties.outputs.minecraft_version }}
    
    steps:
      # ────────────────────────────────────────────────────────────────────────
      # Setup
      # ────────────────────────────────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # ────────────────────────────────────────────────────────────────────────
      # Extract Properties
      # ────────────────────────────────────────────────────────────────────────
      - name: 📋 Extract Mod Properties
        id: properties
        run: |
          echo "mod_version=$(grep -E '^mod_version\s*=' gradle.properties | cut -d'=' -f2 | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "minecraft_version=$(grep -E '^minecraft_version\s*=' gradle.properties | cut -d'=' -f2 | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: 📝 Display Build Information
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    Build Configuration                       ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Mod Version:       ${{ steps.properties.outputs.mod_version }}"
          echo "║  Minecraft Version: ${{ steps.properties.outputs.minecraft_version }}"
          echo "║  Java Version:      ${{ env.JAVA_VERSION }}"
          echo "║  Branch:            ${{ github.ref_name }}"
          echo "║  Commit:            ${{ github.sha }}"
          echo "╚══════════════════════════════════════════════════════════════╝"

      # ────────────────────────────────────────────────────────────────────────
      # Grant Execute Permission
      # ────────────────────────────────────────────────────────────────────────
      - name: 🔧 Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # ────────────────────────────────────────────────────────────────────────
      # Build All Platforms
      # ────────────────────────────────────────────────────────────────────────
      - name: 🏗️ Build NeoForge
        run: ./gradlew :neoforge:build --no-daemon --stacktrace

      - name: 🏗️ Build Fabric
        run: ./gradlew :fabric:build --no-daemon --stacktrace

      # ────────────────────────────────────────────────────────────────────────
      # Upload Artifacts
      # ────────────────────────────────────────────────────────────────────────
      - name: 📦 Upload NeoForge Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AromaCraft-NeoForge-${{ steps.properties.outputs.mod_version }}+MC${{ steps.properties.outputs.minecraft_version }}
          path: |
            neoforge/build/libs/*.jar
            !neoforge/build/libs/*-dev*.jar
            !neoforge/build/libs/*-sources*.jar
          if-no-files-found: error
          retention-days: 30

      - name: 📦 Upload Fabric Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AromaCraft-Fabric-${{ steps.properties.outputs.mod_version }}+MC${{ steps.properties.outputs.minecraft_version }}
          path: |
            fabric/build/libs/*.jar
            !fabric/build/libs/*-dev*.jar
            !fabric/build/libs/*-sources*.jar
          if-no-files-found: error
          retention-days: 30

      - name: 📦 Upload Sources (Combined)
        uses: actions/upload-artifact@v4
        with:
          name: AromaCraft-Sources-${{ steps.properties.outputs.mod_version }}+MC${{ steps.properties.outputs.minecraft_version }}
          path: |
            neoforge/build/libs/*-sources*.jar
            fabric/build/libs/*-sources*.jar
          if-no-files-found: warn
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # Summary Job - Provides build summary
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: 📊 Generate Build Summary
        run: |
          echo "# 🧪 AromaCraft Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Mod Version** | \`${{ needs.build.outputs.mod_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Minecraft** | \`${{ needs.build.outputs.minecraft_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Status** | ${{ needs.build.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **NeoForge**: \`AromaCraft-NeoForge-${{ needs.build.outputs.mod_version }}+MC${{ needs.build.outputs.minecraft_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Fabric**: \`AromaCraft-Fabric-${{ needs.build.outputs.mod_version }}+MC${{ needs.build.outputs.minecraft_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Built with ❤️ by Mood Studios for OVR Technology*" >> $GITHUB_STEP_SUMMARY

