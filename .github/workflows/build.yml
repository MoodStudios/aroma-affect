# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                              Aroma Affect CI/CD                              ║
# ║                                                                              ║
# ║  Automated build pipeline for NeoForge and Fabric mod artifacts              ║
# ║  Architectury API                                                            ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Build Aroma Affect

on:
  push:
    branches:
      - main
      - '[0-9]+.[0-9]+.[0-9]+'      # Version branches (e.g., 1.21.1, 1.20.4)
      - '[0-9]+.[0-9]+.[0-9]+-*'    # Version branches with suffix (e.g., 1.21.1-beta)
  pull_request:
    branches:
      - main
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions required for uploading artifacts
permissions:
  contents: read
  actions: write

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Properties Job - Extract build properties once
  # ════════════════════════════════════════════════════════════════════════════
  properties:
    name: Extract Properties
    runs-on: ubuntu-latest
    
    outputs:
      mod_version: ${{ steps.properties.outputs.mod_version }}
      minecraft_version: ${{ steps.properties.outputs.minecraft_version }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Mod Properties
        id: properties
        run: |
          echo "mod_version=$(grep -E '^mod_version\s*=' gradle.properties | cut -d'=' -f2 | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "minecraft_version=$(grep -E '^minecraft_version\s*=' gradle.properties | cut -d'=' -f2 | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Display Build Information
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    Build Configuration                       ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Mod Version:       ${{ steps.properties.outputs.mod_version }}"
          echo "║  Minecraft Version: ${{ steps.properties.outputs.minecraft_version }}"
          echo "║  Java Version:      ${{ env.JAVA_VERSION }}"
          echo "║  Branch:            ${{ github.ref_name }}"
          echo "║  Commit:            ${{ github.sha }}"
          echo "╚══════════════════════════════════════════════════════════════╝"

  # ════════════════════════════════════════════════════════════════════════════
  # Build Job - Compiles mod for all platforms IN PARALLEL
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    needs: properties
    
    strategy:
      fail-fast: false
      matrix:
        platform: [neoforge, fabric]
        include:
          - platform: neoforge
            name: NeoForge
            artifact_prefix: AromaAffect-NeoForge
          - platform: fabric
            name: Fabric
            artifact_prefix: AromaAffect-Fabric
    
    steps:
      # ────────────────────────────────────────────────────────────────────────
      # Setup
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # ────────────────────────────────────────────────────────────────────────
      # Grant Execute Permission
      # ────────────────────────────────────────────────────────────────────────
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # ────────────────────────────────────────────────────────────────────────
      # Build Platform
      # ────────────────────────────────────────────────────────────────────────
      - name: Build ${{ matrix.name }}
        run: ./gradlew :${{ matrix.platform }}:build --no-daemon --stacktrace

      # ────────────────────────────────────────────────────────────────────────
      # Upload Artifacts
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload ${{ matrix.name }} Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-${{ needs.properties.outputs.mod_version }}+MC${{ needs.properties.outputs.minecraft_version }}
          path: |
            ${{ matrix.platform }}/build/libs/*.jar
            !${{ matrix.platform }}/build/libs/*-dev*.jar
            !${{ matrix.platform }}/build/libs/*-sources*.jar
          if-no-files-found: error
          retention-days: 30

      - name: Upload ${{ matrix.name }} Sources
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}-Sources-${{ needs.properties.outputs.mod_version }}+MC${{ needs.properties.outputs.minecraft_version }}
          path: ${{ matrix.platform }}/build/libs/*-sources*.jar
          if-no-files-found: warn
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # Summary Job - Provides build summary
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [properties, build]
    if: always()
    
    steps:
      - name: Generate Build Summary
        run: |
          echo "# 🧪 AromaAffect Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Mod Version** | \`${{ needs.properties.outputs.mod_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Minecraft** | \`${{ needs.properties.outputs.minecraft_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Status** | ${{ needs.build.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Artifact |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| NeoForge | \`AromaAffect-NeoForge-${{ needs.properties.outputs.mod_version }}+MC${{ needs.properties.outputs.minecraft_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Fabric | \`AromaAffect-Fabric-${{ needs.properties.outputs.mod_version }}+MC${{ needs.properties.outputs.minecraft_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

